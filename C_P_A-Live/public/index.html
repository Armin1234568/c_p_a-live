<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C_P_A-Live | پلتفرم گفتگوی مدرن</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-container" class="glass-card">
        <h1 class="logo-text">C_P_A-Live</h1>
        <p class="subtitle">به دنیای کهکشانی ارتباطات خوش آمدید</p>
        <input type="text" id="username-input" placeholder="نام کاربری خود را وارد کنید..." autocomplete="off">
        <button id="btn-login" class="btn-3d">ورود به کهکشان گفتگو</button>
    </div>

    <div id="app-container" class="hidden">
        <header class="app-header">
            <div class="logo-text-small">C_P_A-Live</div>
            <div id="room-info">اتاق گفتگو فعال</div>
        </header>

        <main class="main-content">
            <section class="video-grid-container">
                <div id="video-grid">
                    <div class="video-wrapper">
                        <video id="local-video" autoplay playsinline muted></video>
                        <span class="video-tag">شما</span>
                    </div>
                </div>
                
                <div class="controls-bar">
                    <button id="btn-toggle-cam" class="btn-control">📹</button>
                    <button id="btn-toggle-mic" class="btn-control">🎙️</button>
                    <button id="btn-share-screen" class="btn-control">🖥️ اسکرین</button>
                </div>
            </section>

            <section class="sidebar glass-card">
                <div class="chat-messages" id="chat-box"></div>
                
                <div id="media-preview" class="hidden"></div>

                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="پیامی بنویسید...">
                    <label for="file-input" class="btn-file">📎</label>
                    <input type="file" id="file-input" style="display:none;">
                    <button id="btn-send" class="btn-3d-send">ارسال</button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/webrtc.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
